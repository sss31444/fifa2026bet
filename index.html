<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026世界杯·四人虚拟投注</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0f2040;
            color: #fff;
            padding: 15px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: #1a3060;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            margin: 6px 0;
        }
        button {
            background: #2584ff;
            color: white;
            font-weight: bold;
        }
        button.danger {
            background: #ff4d4f;
        }
        button.success {
            background: #096;
        }
        .match-item {
            border-bottom: 1px solid #335;
            padding:12px 0;
        }
        .hidden {display: none;}
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding:8px 0;
        }
        .tip {
            font-size:13px;
            color:#a0c0ff;
            margin:8px 0;
        }
        .odds-info {
            font-size:14px;
            color:#ffd700;
            margin:4px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 登录页 -->
    <div id="loginPage">
        <div class="card">
            <h2>2026世界杯·四人虚拟投注</h2>
            <p class="tip">纯虚拟金币，无现金交易｜user1为唯一管理员</p>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="pwd" placeholder="密码">
            <button onclick="login()">登录</button>
        </div>
    </div>

    <!-- 主页面 -->
    <div id="mainPage" class="hidden">
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <h3>欢迎 <span id="curUser"></span></h3>
                <span>余额：<b id="coinNum">0</b> 币</span>
            </div>
            <div style="display:flex;gap:8px;margin-top:10px">
                <button style="flex:1" onclick="showRank()">排行榜</button>
                <button style="flex:1" onclick="showRecord()">我的投注</button>
                <button id="adminBtn" style="flex:1;background:#096;display:none" onclick="showAdmin()">管理比赛</button>
            </div>
            <button class="danger" style="margin-top:10px" onclick="logout()">退出登录</button>
        </div>

        <div class="card">
            <h3>赛事列表（可投注）</h3>
            <div id="matchList"></div>
        </div>
    </div>

    <!-- 排行榜 -->
    <div id="rankPage" class="hidden">
        <div class="card">
            <h3>四人金币排行榜</h3>
            <div id="rankBox"></div>
            <button onclick="backMain()">返回</button>
        </div>
    </div>

    <!-- 我的投注记录 -->
    <div id="recordPage" class="hidden">
        <div class="card">
            <h3>我的全部投注</h3>
            <div id="recordBox"></div>
            <button onclick="backMain()">返回</button>
        </div>
    </div>

    <!-- 管理员页面（仅user1可见） -->
    <div id="adminPage" class="hidden">
        <div class="card">
            <h3>比赛管理（管理员专用）</h3>
            <p class="tip">每场可单独设置 主胜/平局/客胜 赔率</p>
            <button onclick="backMain()" style="margin-bottom:12px">← 返回主页</button>
            <div id="adminMatchList"></div>
            <button onclick="backMain()" style="margin-top:12px">← 返回主页</button>
        </div>
    </div>

    <!-- 投注弹窗 -->
    <div id="betLayer" class="hidden" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);padding:20px;">
        <div class="card">
            <h4 id="betTitle"></h4>
            <div class="odds-info" id="betOddsText"></div>
            <select id="betSelect">
                <option value="home">主队胜</option>
                <option value="draw">平局</option>
                <option value="away">客队胜</option>
            </select>
            <input type="number" id="betNum" placeholder="投注金币数量" min="1">
            <button onclick="submitBet()">确认投注</button>
            <button class="danger" onclick="closeBet()">取消</button>
        </div>
    </div>

    <!-- 赔率编辑弹窗（管理员） -->
    <div id="oddsLayer" class="hidden" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);padding:20px;">
        <div class="card">
            <h4>设置赔率：<span id="oddsMatchTitle"></span></h4>
            <input type="number" id="oddsHome" placeholder="主胜赔率" step="0.01" min="1.01">
            <input type="number" id="oddsDraw" placeholder="平局赔率" step="0.01" min="1.01">
            <input type="number" id="oddsAway" placeholder="客胜赔率" step="0.01" min="1.01">
            <button onclick="saveOdds()">保存赔率</button>
            <button class="danger" onclick="closeOdds()">取消</button>
        </div>
    </div>

    <!-- 比分录入弹窗（管理员） -->
    <div id="scoreLayer" class="hidden" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);padding:20px;">
        <div class="card">
            <h4>录入比分：<span id="scoreMatchTitle"></span></h4>
            <p class="tip">输入最终比分，保存后自动结算</p>
            <input type="text" id="scoreInput" placeholder="格式：2-1">
            <button onclick="confirmScore()">保存比分并结算</button>
            <button class="danger" onclick="closeScore()">取消</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

let loginUser = '';
let USER_LIST = {};
let matchData = [];
let nowBetMid = null;
let nowOddsMid = null;
let saveLock = false; // 防止并发写入

// ====================== 2. Supabase 数据读写 ======================
async function saveData(){
    if(saveLock) return;
    saveLock = true;
    try {
        // 先尝试更新已有记录
        let {error} = await supabase
            .from('game_data')
            .upsert({
                id: 1,
                users: USER_LIST,
                matches: matchData,
                updated_at: new Date().toISOString()
            });
        if(error) throw error;
    } catch(e){
        console.error('保存数据失败',e);
    }
    saveLock = false;
}

async function loadData(){
    try {
        let {data, error} = await supabase
            .from('game_data')
            .select('*')
            .eq('id', 1)
            .single();
        if(error && error.code !== 'PGRST116') throw error;
        if(data){
            // 修复用户数据
            let dbUsers = data.users || {};
            for(let key of ['user1','user2','user3','user4']){
                if(dbUsers[key]){
                    USER_LIST[key] = {
                        pwd: dbUsers[key].pwd || '123456',
                        coin: (dbUsers[key].coin !== undefined) ? dbUsers[key].coin : 10000,
                        record: dbUsers[key].record || []
                    };
                } else {
                    USER_LIST[key] = JSON.parse(JSON.stringify(DEFAULT_USERS[key]));
                }
            }
            // 修复比赛数据
            matchData = data.matches || [];
            if(!Array.isArray(matchData) || matchData.length===0){
                matchData = JSON.parse(JSON.stringify(INIT_MATCHES));
            }
            matchData.forEach((item, i) => {
                if(!item.odds || !item.odds.home){
                    item.odds = JSON.parse(JSON.stringify(INIT_MATCHES[i]?.odds || {home:1.5, draw:3.0, away:4.0}));
                }
                if(item.status === undefined) item.status = 0;
                if(item.result === undefined) item.result = '';
            });
        } else {
            // 数据库无记录，初始化
            USER_LIST = JSON.parse(JSON.stringify(DEFAULT_USERS));
            matchData = JSON.parse(JSON.stringify(INIT_MATCHES));
            await saveData();
        }
        return true;
    } catch(e){
        console.error('加载数据失败',e);
        // 降级到本地数据
        USER_LIST = JSON.parse(JSON.stringify(DEFAULT_USERS));
        matchData = JSON.parse(JSON.stringify(INIT_MATCHES));
        return false;
    }
}

// ====================== 3. 页面切换 ======================
function hideAll(){
    document.querySelectorAll('div[id$="Page"],#betLayer,#oddsLayer,#scoreLayer').forEach(el=>el.classList.add('hidden'));
}
function backMain(){
    hideAll();
    document.getElementById('mainPage').classList.remove('hidden');
    renderMain();
}

// ====================== 4. 登录逻辑 ======================
function login(){
    let un = document.getElementById('username').value.trim();
    let pw = document.getElementById('pwd').value.trim();
    if(!USER_LIST[un]) return alert('用户名不存在');
    if(USER_LIST[un].pwd !== pw) return alert('密码错误');
    loginUser = un;
    hideAll();
    document.getElementById('mainPage').classList.remove('hidden');
    // 仅管理员显示管理按钮
    document.getElementById('adminBtn').style.display = (loginUser===ADMIN_USER) ? 'block' : 'none';
    renderMain();
}
function logout(){loginUser='';hideAll();document.getElementById('loginPage').classList.remove('hidden');}

// ====================== 5. 渲染主页赛事列表 ======================
function renderMain(){
    let u = USER_LIST[loginUser];
    if(!u) { alert('用户数据异常，请重新登录'); logout(); return; }
    document.getElementById('curUser').innerText = loginUser;
    document.getElementById('coinNum').innerText = u.coin || 0;
    let html = '';
    if(!Array.isArray(matchData) || matchData.length===0){
        html = '<p>暂无比赛</p>';
    } else {
        matchData.forEach((m,idx)=>{
            try {
                let home = m.home || '未知';
                let away = m.away || '未知';
                let status = (m.status===undefined) ? 0 : m.status;
                let statusTxt = status==0 ? '可投注' : (status==1?'待结算':'已结算');
                let canBet = status===0;
                let odds = m.odds || {home:'?',draw:'?',away:'?'};
                let oddsTxt = `主胜${odds.home} | 平${odds.draw} | 客胜${odds.away}`;
                html += `
                <div class="match-item">
                    <div>${home} VS ${away} 【${statusTxt}】</div>
                    <div class="odds-info">赔率：${oddsTxt}</div>
                    ${canBet ? `<button style="margin-top:6px" onclick="openBet(${idx})">去投注</button>` : '<p style="color:#aaa">已截止</p>'}
                </div>
                `;
            } catch(e){
                console.error('渲染比赛项失败 idx='+idx, e);
            }
        });
    }
    document.getElementById('matchList').innerHTML = html || '<p>暂无比赛</p>';
}

// ====================== 6. 投注逻辑 ======================
function openBet(idx){
    let m = matchData[idx];
    nowBetMid = idx;
    document.getElementById('betTitle').innerText = `${m.home} VS ${m.away}`;
    document.getElementById('betOddsText').innerText = `赔率：主胜${m.odds.home} | 平${m.odds.draw} | 客胜${m.odds.away}`;
    document.getElementById('betNum').value = '';
    document.getElementById('betLayer').classList.remove('hidden');
}
function closeBet(){document.getElementById('betLayer').classList.add('hidden');}

function submitBet(){
    let idx = nowBetMid;
    let m = matchData[idx];
    let betType = document.getElementById('betSelect').value;
    let num = parseInt(document.getElementById('betNum').value);
    let u = USER_LIST[loginUser];
    if(isNaN(num)||num<1) return alert('输入有效金额');
    if(num > u.coin) return alert('余额不足');
    // 记录投注
    u.coin -= num;
    u.record.push({
        mid:idx,
        match:`${m.home}VS${m.away}`,
        type:betType,
        betCoin:num,
        odds:m.odds[betType],
        status:'pending',
        profit:0
    });
    saveData();
    closeBet();
    renderMain();
    alert('投注成功');
}

// ====================== 7. 排行榜、投注记录 ======================
function showRank(){
    hideAll();
    document.getElementById('rankPage').classList.remove('hidden');
    let arr = Object.entries(USER_LIST).sort((a,b)=>b[1].coin - a[1].coin);
    let html = '';
    arr.forEach(([name,info],i)=>{
        html += `<div class="rank-item"><span>第${i+1}名 ${name}</span><span>${info.coin}币</span></div>`;
    });
    document.getElementById('rankBox').innerHTML = html;
}

function showRecord(){
    hideAll();
    document.getElementById('recordPage').classList.remove('hidden');
    let rec = USER_LIST[loginUser].record;
    let html = '';
    if(rec.length===0){html='暂无投注';}
    rec.forEach(r=>{
        let st = r.status==='pending' ? '待结算' : (r.status==='win'?'盈利':'亏损');
        html += `<div style="padding:8px 0;border-bottom:1px solid #335">
        <div>${r.match}</div>
        <div>投注${r.betCoin}币｜赔率${r.odds}｜${st} ${r.profit>0?`+${r.profit}`:r.profit}</div>
        </div>`;
    });
    document.getElementById('recordBox').innerHTML = html;
}

// ====================== 8. 管理员功能（仅user1） ======================
function showAdmin(){
    if(loginUser!==ADMIN_USER) return alert('无管理员权限');
    hideAll();
    document.getElementById('adminPage').classList.remove('hidden');
    renderAdminMatch();
}

function renderAdminMatch(){
    let html='';
    matchData.forEach((m,idx)=>{
        let s = m.status==0?'未开赛':(m.status==1?'待结算':'已结算');
        let oddsTxt = `主${m.odds.home}/平${m.odds.draw}/客${m.odds.away}`;
        html += `<div class="match-item">
        <div>${m.home} VS ${m.away} <span style="color:${m.status===2?'#aaa':m.status===1?'#ffd700':'#0f0'}">【${s}】</span></div>
        ${m.result ? `<div style="color:#ff9800;font-size:14px">比分：${m.result}</div>` : ''}
        <div class="odds-info">当前赔率：${oddsTxt}</div>
        <button onclick="openOdds(${idx})">修改赔率</button>
        ${m.status===0 ? `<button onclick="setOver(${idx})">录入比分并结算</button>` : ''}
        ${m.status===1 ? `<button onclick="calcMatch(${idx})">执行结算</button>` : ''}
        </div>`;
    });
    document.getElementById('adminMatchList').innerHTML = html || '无比赛';
}

// 打开赔率编辑弹窗
function openOdds(idx){
    let m = matchData[idx];
    nowOddsMid = idx;
    document.getElementById('oddsMatchTitle').innerText = `${m.home} VS ${m.away}`;
    document.getElementById('oddsHome').value = m.odds.home;
    document.getElementById('oddsDraw').value = m.odds.draw;
    document.getElementById('oddsAway').value = m.odds.away;
    document.getElementById('oddsLayer').classList.remove('hidden');
}
function closeOdds(){document.getElementById('oddsLayer').classList.add('hidden');}

// 保存赔率
function saveOdds(){
    let idx = nowOddsMid;
    let h = parseFloat(document.getElementById('oddsHome').value);
    let d = parseFloat(document.getElementById('oddsDraw').value);
    let a = parseFloat(document.getElementById('oddsAway').value);
    if(isNaN(h)||h<1.01||isNaN(d)||d<1.01||isNaN(a)||a<1.01){
        return alert('赔率必须≥1.01');
    }
    matchData[idx].odds = {home:h, draw:d, away:a};
    saveData();
    closeOdds();
    renderAdminMatch();
    alert('赔率已保存');
}

// 录入比分并结算（一步完成）
let nowScoreMid = null;
function setOver(idx){
    let m = matchData[idx];
    nowScoreMid = idx;
    document.getElementById('scoreMatchTitle').innerText = `${m.home} VS ${m.away}`;
    document.getElementById('scoreInput').value = '';
    document.getElementById('scoreLayer').classList.remove('hidden');
}
function closeScore(){ document.getElementById('scoreLayer').classList.add('hidden'); }

function confirmScore(){
    let idx = nowScoreMid;
    if(idx === null) return;
    let m = matchData[idx];
    let score = document.getElementById('scoreInput').value.trim();
    if(!score) return alert('请输入比分');
    if(!/^\d+-\d+$/.test(score)){
        return alert('比分格式错误，请使用 数字-数字 格式，如：2-1');
    }
    m.result = score;
    // 直接结算
    let [hS,aS] = m.result.split('-').map(Number);
    let realRes = hS>aS ? 'home' : (hS===aS ? 'draw' : 'away');
    let settleCount = 0;
    Object.values(USER_LIST).forEach(user=>{
        user.record.forEach(rec=>{
            if(rec.mid===idx && rec.status==='pending'){
                if(rec.type === realRes){
                    let gain = Math.floor(rec.betCoin * rec.odds);
                    user.coin += gain;
                    rec.profit = gain - rec.betCoin;
                    rec.status = 'win';
                }else{
                    rec.profit = -rec.betCoin;
                    rec.status = 'lose';
                }
                settleCount++;
            }
        })
    })
    m.status = 2;
    saveData();
    closeScore();
    renderAdminMatch();
    alert(`【${m.home} ${score} ${m.away}】\n比分已录入，结算完成！共结算 ${settleCount} 笔投注。`);
}

// calcMatch 保留作为单独结算入口（状态=1时使用）
function calcMatch(idx){
    let m = matchData[idx];
    let [hS,aS] = m.result.split('-').map(Number);
    let realRes = hS>aS ? 'home' : (hS===aS ? 'draw' : 'away');
    let settleCount = 0;
    Object.values(USER_LIST).forEach(user=>{
        user.record.forEach(rec=>{
            if(rec.mid===idx && rec.status==='pending'){
                if(rec.type === realRes){
                    let gain = Math.floor(rec.betCoin * rec.odds);
                    user.coin += gain;
                    rec.profit = gain - rec.betCoin;
                    rec.status = 'win';
                }else{
                    rec.profit = -rec.betCoin;
                    rec.status = 'lose';
                }
                settleCount++;
            }
        })
    })
    m.status = 2;
    saveData();
    renderAdminMatch();
    alert(`结算完成！共结算 ${settleCount} 笔投注。`);
}

// ====================== 9. 初始化 ======================
(async function init(){
    hideAll();
    document.getElementById('loginPage').classList.remove('hidden');
    // 显示加载状态
    let loading = await loadData();
    if(!loading){
        console.warn('Supabase 连接失败，使用本地默认数据');
    }
    // 清除旧的 localStorage 数据（避免混淆）
    localStorage.removeItem('matchData');
    localStorage.removeItem('betUser');
})();
</script>
