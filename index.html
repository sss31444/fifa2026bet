// ========== 辅助函数 ==========
function isBetDeadlinePassed(matchDateStr) {
    if (!matchDateStr) return false;
    const [year, month, day] = matchDateStr.split('-').map(Number);
    const deadline = new Date(year, month - 1, day, 0, 0, 0);
    const now = new Date();
    return now >= deadline;
}

function canPlaceBet(match) {
    if (!match || match.status !== 0) return false;
    if (isBetDeadlinePassed(match.matchDate)) return false;
    return true;
}

function userHasBetMatch(matchIdx) {

    return records.some(r => r.mid === matchIdx);
}

// ====================== 2. Supabase 数据读写 ======================
async function saveData(){
    if(saveLock) return;
    saveLock = true;
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/game_data`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Prefer': 'resolution=merge-duplicates'
            },
            body: JSON.stringify({
                id: 1,
                users: USER_LIST,
                matches: matchData,
                updated_at: new Date().toISOString()
            })
        });
        if(!res.ok){
            let errText = await res.text();
            console.warn(`保存失败: ${errText}`);
        } else {
            console.log('✅ 数据已保存到云端');
        }
    } catch(e){
        console.error('保存异常',e);
    }
    saveLock = false;
}

async function loadData(){
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/game_data?id=eq.1&select=*`, {
            headers: { 
                'apikey': SUPABASE_KEY, 
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        let arr = await res.json();
        
        if(arr && arr.length > 0){
            let data = arr[0];
            let dbUsers = data.users || {};
            
            // 加载用户数据
            for(let key of ['user1','user2','user3','user4']){
                if(dbUsers[key]){
                    USER_LIST[key] = {
                        pwd: dbUsers[key].pwd || '123456',
                        coin: (dbUsers[key].coin !== undefined) ? dbUsers[key].coin : 10000,
                        record: dbUsers[key].record || []
                    };
                } else {
                    USER_LIST[key] = JSON.parse(JSON.stringify(DEFAULT_USERS[key]));
                }
            }
            
            // 加载比赛数据
            matchData = data.matches || [];
            if(!Array.isArray(matchData) || matchData.length === 0){
                matchData = JSON.parse(JSON.stringify(INIT_MATCHES));
            }
            
            // 确保每场比赛都有必要字段
            matchData.forEach((item, idx) => {
                if(!item.matchDate && INIT_MATCHES[idx]) {
                    item.matchDate = INIT_MATCHES[idx].matchDate;
                } else if(!item.matchDate){
                    item.matchDate = '2026-06-15';
                }
                if(!item.odds || !item.odds.home){
                    item.odds = INIT_MATCHES[idx]?.odds ? {...INIT_MATCHES[idx].odds} : {home:1.5, draw:3.0, away:4.0};
                }
                if(item.status === undefined) item.status = 0;
                if(item.result === undefined) item.result = '';
            });
            
            console.log('📡 从云端加载数据成功:', {
                user1_coin: USER_LIST.user1?.coin,
                user2_coin: USER_LIST.user2?.coin,
                matches: matchData.length
            });
            return true;
        } else {
            // 数据库为空，初始化默认数据
            console.log('📡 云端无数据，初始化默认数据');
            USER_LIST = JSON.parse(JSON.stringify(DEFAULT_USERS));
            matchData = JSON.parse(JSON.stringify(INIT_MATCHES));
            await saveData();
            return true;
        }
    } catch(e){
        console.error('❌ 加载数据失败', e);
        // 降级到本地数据
        USER_LIST = JSON.parse(JSON.stringify(DEFAULT_USERS));
        matchData = JSON.parse(JSON.stringify(INIT_MATCHES));
        return false;
    }
}

        let deadlinePassed = isBetDeadlinePassed(m.matchDate);

        let alreadyBet = userHasBetMatch(idx);

        else if(alreadyBet) statusTxt = '✅ 已下注本场';
        else statusTxt = '🔥 可投注';
        
        let odds = m.odds;
        let oddsTxt = `主胜 ${odds.home} | 平 ${odds.draw} | 客胜 ${odds.away}`;
        html += `
        <div class="match-item">
            <div><strong>${m.home} 🆚 ${m.away}</strong> <span style="font-size:13px;background:#253c64;padding:2px 6px;border-radius:12px;">${statusTxt}</span></div>
            <div class="odds-info">${oddsTxt}</div>
            <div class="tip" style="font-size:12px;">📅 ${m.matchDate} (投注截止: ${m.matchDate} 00:00)</div>
            ${canBetNow && !alreadyBet ? `<button style="margin-top:6px" onclick="openBet(${idx})">🎲 投注此场</button>` : `<button disabled style="background:#555;margin-top:6px">🚫 不可投注</button>`}
        </div>
        `;
    });
    if(html === '') html = '<p class="tip">当前已隐藏全部已结算赛事，点击右上角按钮展开查看</p>';
    document.getElementById('matchList').innerHTML = html;
}

// ====================== 5. 投注流程 ======================
function openBet(idx){
    let m = matchData[idx];
    // 基础可投校验
    if(!canPlaceBet(m)){
        alert(`⛔ 无法投注！\n原因: 比赛已截止或已结束。\n截止时间: ${m.matchDate} 00:00`);
        return;
    }
    // 本场是否已经下注
    if(userHasBetMatch(idx)){
        alert('⛔ 限制提示：你已经对本场比赛完成下注，每场仅可下注一次！');
        return;
    }
    nowBetMid = idx;
    document.getElementById('betTitle').innerHTML = `${m.home} VS ${m.away}`;
    document.getElementById('betOddsText').innerHTML = `赔率：主${m.odds.home} 平${m.odds.draw} 客${m.odds.away}`;
    document.getElementById('deadlineMsg').innerHTML = `⏰ 投注截止时间: ${m.matchDate} 00:00 (赛前封盘)`;
    document.getElementById('betNum').value = '';
    document.getElementById('betLayer').classList.remove('hidden');
}

function closeBet(){document.getElementById('betLayer').classList.add('hidden');}

async function submitBet(){
    let idx = nowBetMid;
    if(idx === null) return;
    let m = matchData[idx];
    let u = USER_LIST[loginUser];
    
    // 双重校验：防止弹窗绕过直接提交
    if(!canPlaceBet(m)){
        alert(`❌ 投注失败！比赛已超过投注截止时间 (${m.matchDate} 00:00)`);
        closeBet();
        renderMain();
        return;
    }
    if(userHasBetMatch(idx)){
        alert('❌ 投注失败：本场你已下注，不可重复投注！');
        closeBet();
        renderMain();
        return;
    }
    
    let betType = document.getElementById('betSelect').value;
    let num = parseInt(document.getElementById('betNum').value);
    
    // 金额校验：1 ~ BET_MAX_AMOUNT
    if(isNaN(num)||num<1) return alert('请输入有效的投注金额 (≥1)');
    if(num > BET_MAX_AMOUNT) return alert(`投注上限${BET_MAX_AMOUNT}金币，不可超过该数值！`);
    if(num > u.coin) return alert('余额不足，当前余额: '+u.coin);
    
    // 记录投注
    u.coin -= num;
    u.record.push({
        mid: idx,
        match: `${m.home} VS ${m.away}`,
        type: betType,
        betCoin: num,
        odds: m.odds[betType],
        status: 'pending',
        profit: 0,
        betTime: new Date().toISOString(),
        matchDate: m.matchDate
    });
    
    await saveData();
    closeBet();
    renderMain();
    alert(`✅ 投注成功！ 已下注 ${num} 金币`);
}

// ====================== 6. 排行榜（核心优化） ======================
async function showRank(){
    // 显示排行榜前先同步最新数据
    await loadData();
    hideAll();
    document.getElementById('rankPage').classList.remove('hidden');
    
    // 转换为数组并计算未结算金额、总金币
    let userArr = Object.entries(USER_LIST).map(([uid, info])=>{
        // 求和所有pending未结算投注
        let unsettled = 0;
        info.record.forEach(item=>{
            if(item.status === 'pending') unsettled += item.betCoin;
        });
        let total = info.coin + unsettled;
        return {
            uid,
            nick: USER_NICK[uid],
            balance: info.coin,
            unsettled,
            total
        };
    });
    // 按总金币降序排序
    userArr.sort((a,b)=>b.total - a.total);

    let html = '<div class="tip">📊 实时同步自云端数据库，总金币=余额+未结算投注</div>';
    userArr.forEach((item,i)=>{
        let medal = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : '📌'));
        html += `<div class="rank-item">
            <span>${medal} ${item.nick}</span>
            <span>总金币${item.total.toLocaleString()}（余额：${item.balance.toLocaleString()}币，未结算：${item.unsettled.toLocaleString()}币）</span>
        </div>`;
    });
    document.getElementById('rankBox').innerHTML = html;
}

function showRecord(){
    hideAll();
    document.getElementById('recordPage').classList.remove('hidden');
    let rec = USER_LIST[loginUser].record;
    let html = '';
    if(rec.length === 0){
        html = '<div class="tip">暂无投注记录，快去试试吧~</div>';
    } else {
        rec.slice().reverse().forEach(r=>{
            let st = r.status==='pending' ? '⏳ 待结算' : (r.status==='win'?'✅ 已盈利':'❌ 亏损');
            let profitShow = r.profit > 0 ? `+${r.profit}` : r.profit;
            html += `<div style="padding:8px 0;border-bottom:1px solid #335">
            <div>⚽ ${r.match}</div>
            <div>🎯 投注: ${r.betCoin}币 | 赔率${r.odds} | ${st} ${profitShow}币</div>
            <div class="tip">📆 截止: ${r.matchDate || '未知'} 00:00前</div>
            </div>`;
        });
    }
    document.getElementById('recordBox').innerHTML = html;
}

// ====================== 7. 管理员功能 ======================
function showAdmin(){
    if(loginUser !== ADMIN_USER) return alert('无管理员权限');
    hideAll();
    document.getElementById('adminPage').classList.remove('hidden');
    renderAdminMatch();
}

function renderAdminMatch(){
    let html = '';
    matchData.forEach((m,idx)=>{
        // 管理员页面折叠判断
        if(foldSettled && m.status === 2) return;

        let s = m.status == 0 ? '⚪未开赛' : (m.status == 1 ? '🟡待结算' : '🟢已结算');
        let isExpired = isBetDeadlinePassed(m.matchDate);
        html += `<div class="match-item">
        <div><b>${m.home} vs ${m.away}</b> [${s}] ${isExpired && m.status===0 ? '🔴已过投注期' : ''}</div>
        <div class="tip">📅 ${m.matchDate} | 截止: ${m.matchDate} 00:00</div>
        <div>赔率: 主${m.odds.home} / 平${m.odds.draw} / 客${m.odds.away}</div>
        ${m.result ? `<div style="color:#ffb347">📋 比分: ${m.result}</div>` : ''}
        <button onclick="openOdds(${idx})">✏️ 修改赔率</button>
        ${m.status === 0 ? `<button onclick="setOver(${idx})">🎯 录入比分并结算</button>` : ''}
        ${m.status === 1 ? `<button onclick="calcMatch(${idx})">💸 执行结算</button>` : ''}
        </div>`;
    });
    document.getElementById('adminMatchList').innerHTML = html || '<p>无未结算赛事，点击上方按钮展开全部</p>';
}

function openOdds(idx){ nowOddsMid=idx; let m=matchData[idx]; document.getElementById('oddsMatchTitle').innerText=`${m.home} VS ${m.away}`; document.getElementById('oddsHome').value=m.odds.home; document.getElementById('oddsDraw').value=m.odds.draw; document.getElementById('oddsAway').value=m.odds.away; document.getElementById('oddsLayer').classList.remove('hidden');}
function closeOdds(){document.getElementById('oddsLayer').classList.add('hidden');}
async function saveOdds(){ let idx=nowOddsMid; let h=parseFloat(document.getElementById('oddsHome').value); let d=parseFloat(document.getElementById('oddsDraw').value); let a=parseFloat(document.getElementById('oddsAway').value); if(isNaN(h)||h<1.01||isNaN(d)||d<1.01||isNaN(a)||a<1.01) return alert('赔率必须≥1.01'); matchData[idx].odds={home:h, draw:d, away:a}; await saveData(); closeOdds(); renderAdminMatch(); alert('赔率已更新');}

let nowScoreMid=null;
function setOver(idx){ nowScoreMid=idx; let m=matchData[idx]; document.getElementById('scoreMatchTitle').innerText=`${m.home} VS ${m.away}`; document.getElementById('scoreInput').value=''; document.getElementById('scoreLayer').classList.remove('hidden');}
function closeScore(){document.getElementById('scoreLayer').classList.add('hidden');}
async function confirmScore(){
    let idx=nowScoreMid; if(idx===null) return;
    let m=matchData[idx];
    let score=document.getElementById('scoreInput').value.trim();
    if(!score || !/^\d+-\d+$/.test(score)) return alert('比分格式错误，示例: 2-1');
    m.result=score;
    let [hS,aS]=m.result.split('-').map(Number);
    let realRes = hS>aS?'home':(hS===aS?'draw':'away');
    let settleCount=0;
    Object.values(USER_LIST).forEach(user=>{
        user.record.forEach(rec=>{
            if(rec.mid===idx && rec.status==='pending'){
                if(rec.type===realRes){
                    let gain=Math.floor(rec.betCoin * rec.odds);
                    user.coin += gain;
                    rec.profit = gain - rec.betCoin;
                    rec.status='win';
                }else{
                    rec.profit = -rec.betCoin;
                    rec.status='lose';
                }
                settleCount++;
            }
        });
    });
    m.status=2;
    await saveData();
    closeScore();
    renderAdminMatch();
    alert(`【${m.home} ${score} ${m.away}】\n结算完成！共结算 ${settleCount} 笔投注。`);
}

async function calcMatch(idx){
    let m=matchData[idx];
    if(!m.result) return alert('请先录入比分');
    let [hS,aS]=m.result.split('-').map(Number);
    let realRes = hS>aS?'home':(hS===aS?'draw':'away');
    let settleCount=0;
    Object.values(USER_LIST).forEach(user=>{
        user.record.forEach(rec=>{
            if(rec.mid===idx && rec.status==='pending'){
                if(rec.type===realRes){
                    let gain=Math.floor(rec.betCoin * rec.odds);
                    user.coin += gain;
                    rec.profit=gain - rec.betCoin;
                    rec.status='win';
                } else {
                    rec.profit=-rec.betCoin;
                    rec.status='lose';
                }
                settleCount++;
            }
        });
    });
    m.status=2;
    await saveData();
    renderAdminMatch();
    alert(`结算完成！共结算 ${settleCount} 笔。`);
}

// ========== 新增：添加赛事配套JS函数 ==========
function openAddMatch(){
    document.getElementById('addMatchLayer').classList.remove('hidden');
    // 清空输入框
    ['addHome','addAway','addDate','addHomeOdds','addDrawOdds','addAwayOdds'].forEach(id=>document.getElementById(id).value='')
}
function closeAddMatch(){
    document.getElementById('addMatchLayer').classList.add('hidden');
}
async function saveNewMatch(){
    let home = document.getElementById('addHome').value.trim();
    let away = document.getElementById('addAway').value.trim();
    let date = document.getElementById('addDate').value.trim();
    let h = parseFloat(document.getElementById('addHomeOdds').value);
    let d = parseFloat(document.getElementById('addDrawOdds').value);
    let a = parseFloat(document.getElementById('addAwayOdds').value);
    // 简单校验
    if(!home||!away||!/^\d{4}-\d{2}-\d{2}$/.test(date)||h<1.01||d<1.01||a<1.01){
        return alert('信息填写错误，请检查名称、日期格式、赔率≥1.01');
    }
    // 新增比赛对象，状态默认未开赛
    matchData.push({
        home,away,
        odds:{home:h,draw:d,away:a},
        status:0,
        result:'',
        matchDate:date
    })
    await saveData();
    closeAddMatch();
    renderAdminMatch();
    alert('新比赛已同步到云端数据库！');
}

(async function init(){
    USER_LIST = JSON.parse(JSON.stringify(DEFAULT_USERS));
    matchData = JSON.parse(JSON.stringify(INIT_MATCHES));
    hideAll();
    document.getElementById('loginPage').classList.remove('hidden');
    await loadData();
    console.log('🎮 系统就绪，投注截止时间基于比赛日00:00自动判定');
})();
